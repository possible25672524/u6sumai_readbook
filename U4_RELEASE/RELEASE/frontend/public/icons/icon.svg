<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0F172A"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="url(#bg)"/>
  <!-- Graduation cap icon -->
  <text x="256" y="320" font-size="220" text-anchor="middle" fill="white">🎓</text>
  <!-- AI dot accent -->
  <circle cx="370" cy="160" r="32" fill="#22d3ee" opacity="0.9"/>
  <text x="370" y="172" font-size="28" text-anchor="middle" fill="#0f172a" font-weight="bold">AI</text>
</svg>
