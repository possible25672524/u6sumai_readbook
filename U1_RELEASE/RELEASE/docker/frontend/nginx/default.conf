# frontend/docker/nginx/default.conf
# Baked into the `frontend` (production target) image at build time.
# This container is the SINGLE public entrypoint in production:
#   - serves the built React SPA
#   - proxies /api/* internally to the `nginx` (API gateway) service,
#     so the browser only ever talks to ONE origin (no CORS headaches),
#     mirroring how vite's dev proxy already works locally.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500m;

    # Compression for the SPA bundle
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;

    # Static assets: long cache, immutable (Vite fingerprints filenames)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API + asset uploads -> internal api-gateway (nginx -> php-fpm)
    location /api/ {
        proxy_pass http://nginx:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts: uploads can be large (audio/video) and some
        # endpoints may stream AI responses (RAG chatbot, Module 9/10).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off; # needed for SSE/streamed chat responses later
    }

    # React Router (client-side routing) fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
