# docker/nginx/backend.conf
# API gateway in front of the `backend` php-fpm container.
#
# Design choice: this is a pure JSON REST API (no Blade views, no nginx-
# served static assets), so nginx does NOT need read access to the Laravel
# codebase at all. Every request is forwarded straight to php-fpm via
# FastCGI with a hardcoded SCRIPT_FILENAME pointing at Laravel's front
# controller (public/index.php) inside the *backend* container's own
# filesystem. This removes the need for a bind-mount or a shared volume
# between nginx and backend, which is what makes this config safe to use
# unchanged in both dev and production.

server {
    listen 80;
    server_name _;

    client_max_body_size 500m;
    client_body_timeout 300s;

    # Laravel's built-in health check route (Laravel 11+: GET /up)
    location = /up {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_read_timeout 10s;
    }

    location / {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param HTTPS $https if_not_empty;

        # Document-pipeline endpoints (large uploads, longer processing
        # acknowledgement) need generous timeouts.
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        proxy_buffering off;
    }

    location = /favicon.ico { access_log off; log_not_found off; return 204; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; }
}
