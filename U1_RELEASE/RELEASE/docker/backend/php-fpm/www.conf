; backend/docker/php-fpm/www.conf
; Enables the FPM `ping`/`status` pages on the internal FastCGI port so the
; container healthcheck (and nginx, if desired) can verify the pool is alive
; without depending on the Laravel app itself being fully bootstrapped.

[www]
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Keep FPM logs on stdout/stderr so `docker compose logs` captures them
catch_workers_output = yes
decorate_workers_output = no
