; backend/docker/php/custom.ini
; Overrides for the AI Study Assistant pipeline:
;   - large uploads (audio/video learning sources, Module 3)
;   - higher memory ceiling for OCR/image processing (Module 4)
;   - opcache tuned for production-ish performance even in dev

upload_max_filesize = 500M
post_max_size = 520M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M

; OCR/Whisper/Embedding jobs run in the QUEUE WORKER, not in the web request,
; so these web-facing limits stay sane. Worker-side limits are set per-job
; in Laravel queue config (`retry_after`, `timeout`) instead of php.ini.

date.timezone = Asia/Bangkok

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
