# =============================================================================
# docker-compose.yml  —  PRODUCTION-SAFE BASE
# =============================================================================
# Phase 2: adds the Document Processing Pipeline infrastructure (OCR queue
# workers, AI/embedding queue workers, ChromaDB persistence, larger upload
# limits) on top of the Phase 0/1 Auth+RBAC foundation.
#
# Design rules this file follows (see DEPLOYMENT.md for the full rationale):
#   1. No bind-mounts of source code. Code is COPY'd into images at build
#      time -> this file is safe to run unmodified on a real server.
#   2. Only ONE service publishes a host port: `frontend` (the SPA), which
#      also reverse-proxies /api/* internally to the `nginx` API gateway.
#      MariaDB/Redis/ChromaDB/MinIO are reachable ONLY on the internal
#      Docker network — never bound to the host here.
#   3. Every service has a healthcheck; dependents wait on
#      `condition: service_healthy`, not just "container started".
#
# For local development (hot-reload bind-mounts + extra debug ports for
# MariaDB/Redis/ChromaDB/MinIO/the API gateway), Docker Compose automatically
# layers `docker-compose.override.yml` on top of this file — no extra flags
# needed. Run `docker compose up -d --build` exactly as before.
#
# To deploy this base file WITHOUT the dev override (e.g. on a server),
# either remove docker-compose.override.yml or run:
#   docker compose -f docker-compose.yml up -d --build
# Requires Docker Compose v2.20+ (for reliable `deploy.resources.limits`
# enforcement outside Swarm; legacy `mem_limit`/`cpus` fallbacks are also
# set on every resource-capped service so this still degrades gracefully
# on older installs — see PHASE_2_INFRASTRUCTURE.md §6 "Defect 2").
#
# .env is MANDATORY in every mode, including local dev — there is no
# working fallback for secrets baked into this file or the dev override.
# Run `./scripts/bootstrap-env.sh` once before the first `docker compose up`.
# =============================================================================

services:
  # ---------------------------------------------------------------
  # Backend: Laravel 12 (PHP-FPM) — includes Tesseract OCR + ffmpeg + poppler
  # ---------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-backend
    restart: unless-stopped
    environment:
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks: [study-ai]

  # Three queue-worker pools sharing the backend image, split by workload
  # shape so they can be scaled/tuned independently:
  #   - ocr        : CPU-bound, local (Tesseract OCR, ffmpeg audio extraction)
  #   - ai          : I/O-bound, waits on external APIs (Whisper, OpenAI
  #                   embeddings, Claude Sonnet generation/RAG)
  #   - default     : everything else / low-priority cleanup jobs
  queue-worker-ocr:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-queue-worker-ocr
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=ocr,transcribe", "--tries=3", "--timeout=900", "--sleep=1"]
    environment:
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    # Fixed in v4.1 (see PHASE_2_INFRASTRUCTURE.md §6 "Defect 2"):
    # `deploy.resources.limits` is only honored by `docker compose up` on
    # Compose v2.20+; older installs silently ignore it outside Swarm mode.
    # These two legacy top-level keys are understood by every Compose V2
    # release and enforce the same cap as a guaranteed fallback.
    mem_limit: 1g
    cpus: 2.0
    networks: [study-ai]

  queue-worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-queue-worker-ai
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=embedding,ai-generation", "--tries=3", "--timeout=300", "--sleep=1"]
    environment:
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    mem_limit: 512m
    cpus: 1.0
    networks: [study-ai]

  queue-worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-queue-worker-default
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=default", "--tries=3", "--timeout=120", "--sleep=2"]
    environment:
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks: [study-ai]

  # Nginx API gateway: fastcgi -> backend. No host port published here in
  # the base file - the `frontend` container is the only public entrypoint.
  # (docker-compose.override.yml re-adds a host port for local API testing.)
  nginx:
    image: nginx:1.27-alpine
    container_name: study-ai-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Frontend: React + Vite + PWA, built to a static SPA and served by
  # nginx in production (target: production). THIS is the public
  # entrypoint: it serves the SPA AND proxies /api/* to the `nginx`
  # service above, so the browser only ever talks to one origin.
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: /api
    container_name: study-ai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Database: MariaDB — internal-only (no host port in base file)
  # ---------------------------------------------------------------
  mariadb:
    image: mariadb:11
    container_name: study-ai-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-study_assistant}
      MARIADB_USER: ${MARIADB_USER:-study_assistant}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Cache / Queue: Redis — internal-only
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: study-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Vector Database: ChromaDB (embedding/RAG) — internal-only
  # Pinned to a known release; the legacy IS_PERSISTENT/PERSIST_DIRECTORY
  # env vars from Chroma 0.4/0.5 are intentionally NOT used on the current
  # 1.x line - persistence is controlled by the /data volume mount instead.
  # ---------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:${CHROMA_VERSION:-1.5.7}
    container_name: study-ai-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Object Storage: MinIO (ไฟล์ที่ผู้ใช้อัปโหลด) — internal-only
  #
  # !! KNOWN SUPPLY-CHAIN RISK — see DEPLOYMENT.md "MinIO risk" section !!
  # As of late 2025, MinIO's community edition moved to source-only
  # distribution and is in maintenance mode; the last Docker Hub image has
  # an unpatched, high-severity privilege-escalation advisory
  # (GHSA-jjjj-jwhf-8rgr / CVE-2025-62506, CVSS 8.1). No currently published
  # minio/minio tag on Docker Hub is free of this. Pinned below (not
  # `:latest`) purely for build reproducibility, NOT because it is "safe".
  # Mitigations applied here: internal-only network, root creds only used
  # by trusted backend/queue-worker services, no STS/service-account
  # features enabled. This is flagged as an OPEN RISK for the team to
  # resolve before any public/production launch - see project_memory.md.
  # ---------------------------------------------------------------
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2025-04-22T22-12-26Z}
    container_name: study-ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks: [study-ai]

  # สร้าง bucket เริ่มต้นให้อัตโนมัติ (raw uploads + processed derivatives),
  # รันครั้งเดียวแล้ว exit (ไม่ต้อง restart)
  minio-init:
    image: minio/mc:${MINIO_MC_VERSION:-RELEASE.2025-08-13T08-35-41Z-cpuv1}
    container_name: study-ai-minio-init
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
    depends_on:
      minio:
        condition: service_healthy
    # Bonus hardening (outside the 4 tracked defects, applied while already
    # editing this block): credentials now travel via MC_HOST_local (mc's
    # own credential-URL convention, read at container runtime), instead of
    # being interpolated into the entrypoint command string by Compose at
    # parse time. Functionally equivalent, slightly safer secret handling.
    entrypoint: >
      /bin/sh -c "
      mc mb -p local/${MINIO_BUCKET_RAW:-study-assistant-raw};
      mc mb -p local/${MINIO_BUCKET_PROCESSED:-study-assistant-processed};
      exit 0;
      "
    networks: [study-ai]

networks:
  study-ai:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  chroma_data:
  minio_data:
  backend_storage:
