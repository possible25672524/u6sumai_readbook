# =============================================================================
# docker-compose.override.yml  —  LOCAL DEV CONVENIENCE LAYER
# =============================================================================
# Auto-loaded by `docker compose up` whenever this file sits next to
# docker-compose.yml — no extra -f flags needed, exactly like Phase 0/1.
#
# Adds back everything that's intentionally absent from the production-safe
# base file: source bind-mounts (hot reload), the vite dev server, and
# direct host ports onto MariaDB/Redis/ChromaDB/MinIO/the API gateway so you
# can point DBeaver/RedisInsight/Postman/the MinIO console straight at them.
#
# To deploy WITHOUT these dev conveniences (staging/production), simply
# don't ship this file, or run:
#   docker compose -f docker-compose.yml up -d --build
# =============================================================================

services:
  backend:
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage

  queue-worker-ocr:
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage

  queue-worker-ai:
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage

  queue-worker-default:
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage

  nginx:
    ports:
      - "${NGINX_PORT:-8000}:80"

  frontend:
    build:
      target: development
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nginx:80
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173/"]

  # NOTE (fixed in v4.1 — see PHASE_2_INFRASTRUCTURE.md §6 "Defect 1"):
  # this file used to also set MARIADB_PASSWORD/MINIO_ROOT_USER/etc with
  # `:-` fallback defaults here. That was misleading: docker-compose.yml
  # (base) declares those same variables as MANDATORY (`:?`), and Compose
  # resolves each file's ${...} expressions independently — the base
  # file's mandatory check fails before this file's fallback could ever
  # apply. There is no environment-variable trick that makes secrets
  # optional in dev while mandatory in prod across two files; the only
  # correct fix is "every environment needs a real .env, including dev."
  # `scripts/bootstrap-env.sh` (new) automates that one-time step.
  mariadb:
    ports:
      - "${MARIADB_PORT:-3306}:3306"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  chromadb:
    ports:
      - "${CHROMA_PORT:-8001}:8000"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  frontend_node_modules:
