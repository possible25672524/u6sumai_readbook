server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 200M; # รองรับอัปโหลดไฟล์เสียง/วิดีโอขนาดใหญ่

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300; # งาน AI/OCR บางอย่างอาจใช้เวลานานกว่า default
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
