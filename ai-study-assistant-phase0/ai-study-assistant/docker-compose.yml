services:
  # ---------------------------------------------------------------
  # Backend: Laravel 12 (PHP-FPM) — รวม Tesseract OCR ไว้ใน image เดียวกัน
  # ---------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [study-ai]

  # Queue worker: รัน image เดียวกับ backend แต่สั่ง php artisan queue:work
  # งานหนักทั้งหมด (OCR, Whisper transcribe, Embedding, Claude generation) ทำที่นี่แบบ async
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-queue-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=600"]
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
    networks: [study-ai]

  # Nginx: หน้าด่านรับ HTTP request แล้ว forward ไปยัง backend (php-fpm) ผ่าน fastcgi
  nginx:
    image: nginx:1.27-alpine
    container_name: study-ai-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Frontend: React + Vite + PWA (dev server พร้อม hot reload)
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: study-ai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nginx:80
    depends_on:
      - nginx
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Database: MariaDB
  # ---------------------------------------------------------------
  mariadb:
    image: mariadb:11
    container_name: study-ai-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-study_assistant}
      MARIADB_USER: ${MARIADB_USER:-study_assistant}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_secret}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Cache / Queue: Redis
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: study-ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Vector Database: ChromaDB (สำหรับ embedding/RAG)
  # ---------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: study-ai-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks: [study-ai]

  # ---------------------------------------------------------------
  # Object Storage: MinIO (ไฟล์ที่ผู้ใช้อัปโหลด)
  # ---------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: study-ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [study-ai]

  # สร้าง bucket เริ่มต้นให้อัตโนมัติ รันครั้งเดียวแล้ว exit (ไม่ต้อง restart)
  minio-init:
    image: minio/mc:latest
    container_name: study-ai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_secret};
      mc mb -p local/${MINIO_BUCKET:-study-assistant-files};
      exit 0;
      "
    networks: [study-ai]

networks:
  study-ai:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  chroma_data:
  minio_data:
  frontend_node_modules:
