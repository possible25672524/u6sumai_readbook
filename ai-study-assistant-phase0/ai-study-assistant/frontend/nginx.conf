server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # รองรับ client-side routing ของ React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets ที่มี hash ในชื่อไฟล์อยู่แล้ว
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # service worker ของ PWA ห้าม cache เพื่อให้ autoUpdate ทำงานได้ทันที
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
